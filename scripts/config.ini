# scripts/config.ini
# ======================================================================================================
# Ubuntu 24.04 LTS 自动安装配置文件
# 版本: 2025.12 (Updated)
# ======================================================================================================

# ==============================
# 基础路径配置
# ==============================
INSTALL_BASE_DIR="$HOME"
PROGRAMS_DIR="$HOME/programs"
CONFIG_DIR="$HOME/.config"
DATA_BACKUP_DIR="/media/$USER/Data/ubuntu_backups"

# 数据目录（相对于项目根目录）
DATA_DIR_NAME="data"
DOCS_DIR_NAME="docs"

# ==============================
# 系统设置
# ==============================
# [安全警告] 请勿在此处存储明文密码。建议在运行脚本时手动设置 Root 密码。
# ROOT_PASSWORD="YOUR_PASSWORD_HERE" 
TIMEZONE="Asia/Shanghai"
LOCALE="en_US.UTF-8"

# Java 环境包名 (用于 tinyMediaManager 等)
JAVA_PACKAGE="openjdk-21-jre"

# ==============================
# Double Commander
# 版本: 1.1.30 (2025-11 更新)
# ==============================
DC_VERSION="1.1.30"
# 注意：SourceForge 路径必须包含 "DC%20for%20Linux%2064%20bit"
DC_BASE_URL="https://sourceforge.net/projects/doublecmd/files/DC%20for%20Linux%2064%20bit/Double%20Commander%20${DC_VERSION}"
DC_FILE_NAME="doublecmd-${DC_VERSION}.gtk2.x86_64.tar.xz"
DC_INSTALL_DIR="${PROGRAMS_DIR}/doublecmd"

# ==============================
# Firefox
# ==============================
FIREFOX_PPA="ppa:mozillateam/ppa"

# ==============================
# NextCloud Desktop Client
# 版本: 4.0.3 (2025-12 更新)
# ==============================
NEXTCLOUD_VERSION="4.0.3"
NEXTCLOUD_FILE="Nextcloud-${NEXTCLOUD_VERSION}-x86_64.AppImage"
NEXTCLOUD_URL="https://github.com/nextcloud-releases/desktop/releases/download/v${NEXTCLOUD_VERSION}/${NEXTCLOUD_FILE}"
NEXTCLOUD_INSTALL_DIR="${PROGRAMS_DIR}/nextcloud"
# [CHANGE_ME] 您的 NextCloud 服务器地址
NEXTCLOUD_SERVER="nc.nl.tab.digital"

# ==============================
# tinyMediaManager
# 版本: 5.2.4 (2025-11 更新)
# ==============================
TMM_VERSION="5.2.4"
# 注意：v5 新版文件名为 tinyMediaManager-... 且格式为 .tar.xz
TMM_FILE="tinyMediaManager-${TMM_VERSION}-linux-amd64.tar.xz"
TMM_URL="https://release.tinymediamanager.org/v5/dist/${TMM_FILE}"
TMM_INSTALL_DIR="${PROGRAMS_DIR}/tinymediamanager"

# ==============================
# Aria2
# ==============================
ARIA2_CONFIG_DIR="${CONFIG_DIR}/aria2"
# 下载目录将优先使用 xdg-user-dir (系统默认下载文件夹)
# ARIA2_DOWNLOAD_DIR="$HOME/Downloads"
# [安全提示] 请修改下面的 RPC 密钥
ARIA2_RPC_SECRET="YOUR_RPC_SECRET_CHANGE_ME"

# ==============================
# OpenVPN
# ==============================
OPENVPN_CONFIG_DIR="${PROGRAMS_DIR}/openvpn"
# VPN 配置文件名前缀 (例如文件名为 MyHome.ovpn，则填 MyHome)
OPENVPN_PROFILE_NAME="AC3100"
OPENVPN_SERVER="myac.dynamic-dns.net"
OPENVPN_PORT="1194"

# ==============================
# APT 软件包列表
# 说明: 格式为 "包名:描述"
# ==============================
APT_PACKAGES=(
    # Android 工具
    "adb:Android Debug Bridge"
    "fastboot:Android Fastboot Tool"
    
    # 网络工具
    "curl:命令行URL工具"
    "wget:网络下载工具"
    "net-tools:网络工具集"
    "openvpn:OpenVPN客户端"
    "aria2:多线程下载工具"
    "filezilla:FTP客户端"
    
    # 开发工具
    "git:版本控制系统"
    "python3-pip:Python包管理器"
    "python3-venv:Python虚拟环境"
    
    # 系统工具
    "gnome-tweaks:GNOME优化工具"
    "gnome-shell-extension-manager:扩展管理器"
    "hardinfo:硬件信息查看器"
    "dconf-editor:配置编辑器"
    
    # 多媒体
    "vlc:VLC媒体播放器"
    "gimp:图像编辑器"
    "ffmpeg:多媒体处理工具"
    
    # 办公软件
    "libreoffice:LibreOffice办公套件"
    "goldendict:词典工具"
    
    # 终端工具
    "putty:SSH客户端"
    "htop:进程监控"
    "tree:目录树显示"
    "vim:文本编辑器"
    
    # 虚拟化 (Virtual Machine Manager)
    "qemu-kvm:QEMU虚拟机"
    "libvirt-daemon-system:Libvirt守护进程"
    "libvirt-clients:Libvirt客户端"
    "bridge-utils:网桥工具"
    "virt-manager:虚拟机管理器"
    "virt-viewer:虚拟机查看器"
    "ovmf:UEFI固件"
    
    # 压缩工具
    "p7zip-full:7-Zip完整版"
    "unrar:RAR解压工具"
    "libunrar5:RAR库文件"
)

# ==============================
# DEB 软件包下载列表
# 说明: 格式为 "描述:下载URL"
# ==============================
DEB_PACKAGES=(
    # BlueMail - 邮件客户端
    "BlueMail:https://download.bluemail.me/BlueMail/deb/BlueMail.deb"
    
    # VeraCrypt - 加密工具 (版本 1.26.24 - 2025 Updated)
    "VeraCrypt:https://launchpad.net/veracrypt/trunk/1.26.24/+download/veracrypt-1.26.24-Ubuntu-24.04-amd64.deb"
    
    # XnView - 图像查看器 (最新版)
    "XnView:https://download.xnview.com/XnViewMP-linux-x64.deb"
)

# ==============================
# 系统 Hosts 屏蔽列表
# ==============================
HOSTS_BLOCKLIST=(
    "127.0.0.1\tbaidustatic.com"
    "127.0.0.1\tcpro.baidustatic.com"
    "127.0.0.1\tpos.baidu.com"
    "127.0.0.1\thm.baidu.com"
)

# ==============================
# Bash 别名配置
# ==============================
SHELL_ALIASES=(
    "alias ll='ls -alFX'"
    "alias la='ls -AX'"
    "alias l='ls -CFX'"
    "alias ..='cd ..'"
    "alias ...='cd ../..'"
    "alias uu='sudo apt update -y && sudo apt upgrade -y && sudo apt autoremove -y'"
    "alias ports='sudo netstat -tulanp'"
    "alias meminfo='free -m -l -t'"
    "alias psmem='ps auxf | sort -nr -k 4'"
    "alias pscpu='ps auxf | sort -nr -k 3'"
)

# ==============================
# GNOME 扩展列表
# 说明: 需要手动从 extensions.gnome.org 安装
# ==============================
GNOME_EXTENSIONS=(
    "Vitals:1460"
    "OpenWeather:750"
    "Screenshot Tool:1112"
    "Clipboard Indicator:779"
    "User Themes:19"
    "Dash to Dock:307"
)

# ==============================
# Rime 输入法配置
# ==============================
RIME_PACKAGES=(
    "ibus-rime"
    "librime-data-wubi"
    "librime-data-pinyin-simp"
)

# ==============================
# 备份路径列表
# ==============================
BACKUP_PATHS=(
    "~/programs"
    "~/.ssh"
    "~/.gitconfig"
    "~/.bashrc"
    "~/.config/autostart"
    "~/.config/aria2"
    "~/.config/ibus/rime"
)

# ==============================
# 日志配置
# ==============================
LOG_DIR="$HOME/ubuntu-install/logs"
LOG_FILE="${LOG_DIR}/install_$(date +%Y%m%d_%H%M%S).log"
ENABLE_LOGGING=true

# ==============================
# 安装选项
# ==============================
SKIP_SNAP_REMOVAL=false
SKIP_APT_PACKAGES=false
SKIP_DEB_PACKAGES=false
SKIP_DESKTOP_APPS=false
AUTO_REBOOT=false

# ==============================
# 网络配置
# ==============================
WIFI_SSID="YOUR_WIFI_NAME"
WIFI_PASSWORD="YOUR_WIFI_PASSWORD"

# ==============================
# 开发者选项
# ==============================
DEBUG_MODE=false
DRY_RUN=false
VERBOSE=true
